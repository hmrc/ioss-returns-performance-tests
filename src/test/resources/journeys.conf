journeys {

  returns = {
    description = "Returns journey"
    load = 0.5
    feeder = data/vrns.csv
    parts = [
      returns,
      submittedReturnsForMultipleIOSSNumbers,
      intermediaryReturns
    ]
  }

  fileUpload = {
    description = "File Upload journey"
    load = 0.0185
    feeder = [
      data/vrns.csv,
      data/fileUpload.csv
    ]
    parts = [
      fileUpload
    ]
  }
}

journeysToRun.0 = returns
journeysToRun.1 = fileUpload

